[skywalking_agent]
skywalking_agent.enable=On
skywalking_agent.reporter_type=grpc
skywalking_agent.log_file=/tmp/skywalking-agent.log
skywalking_agent.log_level=INFO
skywalking_agent.inject_context=On
skywalking_agent.psr_logging_level=${SW_AGENT_PSR_LOGGING_LEVEL}
skywalking_agent.server_addr=${SW_AGENT_COLLECTOR_BACKEND_SERVICES}
skywalking_agent.service_name=${SW_AGENT_NAME}
